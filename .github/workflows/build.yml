name: Build and Package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write  # required for creating GitHub releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install XMake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Cache XMake packages
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/.xmake
          key: xmake-${{ runner.os }}-${{ hashFiles('xmake.lua', 'extern/CommonLibSF/xmake.lua') }}
          restore-keys: xmake-${{ runner.os }}-

      - name: Configure (releasedbg, x64)
        run: xmake f -m releasedbg -a x64 -y

      - name: Build
        run: xmake -y

      - name: Install DLL to dist/
        run: xmake install -o dist

      - name: Add Papyrus scripts and FOMOD metadata
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/Scripts/Source/User" | Out-Null
          New-Item -ItemType Directory -Force -Path "dist/fomod"               | Out-Null

          Copy-Item "fomod/info.xml"         "dist/fomod/"
          Copy-Item "fomod/ModuleConfig.xml" "dist/fomod/"

          Copy-Item "Data/Scripts/CompletePlanetSurveyQuest.pex"  "dist/Scripts/"
          Copy-Item "Data/Scripts/CompletePlanetSurveyNative.pex" "dist/Scripts/"

          Copy-Item "Data/Scripts/Source/User/CompletePlanetSurveyQuest.psc"  "dist/Scripts/Source/User/"
          Copy-Item "Data/Scripts/Source/User/CompletePlanetSurveyNative.psc" "dist/Scripts/Source/User/"

      - name: Create release ZIP
        shell: pwsh
        run: |
          # Use the git tag when on a tag push, otherwise 'dev'
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $env:GITHUB_REF_NAME -replace '^v', ''
          } else { 'dev' }

          $zipName = "Complete-Planet-Survey-$version.zip"
          Compress-Archive -Path "dist/*" -DestinationPath $zipName
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: complete-planet-survey
          path: Complete-Planet-Survey-*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Complete-Planet-Survey-*.zip
          generate_release_notes: true
